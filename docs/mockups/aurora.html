<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>capad — Direction C · Aurora</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#222033; --muted:#6a6786; --accent:#1aa6b0; --mx:50%; --my:50%; }
  *{box-sizing:border-box;margin:0}
  html,body{height:100%}
  body{font-family:"Space Grotesk",system-ui,sans-serif;color:var(--ink);background:#f3f1fb;overflow:hidden}
  .mesh{position:fixed;inset:-18%;z-index:0;filter:blur(12px)}
  .mesh span{position:absolute;border-radius:50%;filter:blur(72px);opacity:.92;animation:drift 28s ease-in-out infinite}
  .b1{width:50vw;height:50vw;left:2%;bottom:-12%;background:#c6f7e2}
  .b2{width:52vw;height:52vw;right:-4%;top:-10%;background:#ddc9ff;animation-delay:-9s}
  .b3{width:38vw;height:38vw;left:42%;top:40%;background:#ffe3d1;animation-delay:-18s}
  @keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(3%,2%) scale(1.06)}66%{transform:translate(-2%,-2%) scale(.97)}}

  .cp-wrap{position:fixed;left:50%;top:54%;z-index:1;transform:translate(calc(-50% + var(--px,0px)), calc(-50% + var(--py,0px)));transition:transform .3s ease-out}
  .blob{width:min(62vmin,560px);height:min(62vmin,560px);position:relative;animation:morph 14s ease-in-out infinite, float 11s ease-in-out infinite;
    background:radial-gradient(circle at 42% 34%, rgba(255,255,255,.94), rgba(214,201,255,.34) 42%, rgba(54,209,220,.14) 66%, transparent 74%);
    box-shadow:inset -26px -26px 100px rgba(54,209,220,.18), inset 26px 26px 90px rgba(255,255,255,.88), 0 50px 110px -24px rgba(120,100,200,.24);
    backdrop-filter:blur(2px)}
  .blob::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:radial-gradient(220px 220px at var(--mx) var(--my), rgba(255,255,255,.65), transparent 60%);mix-blend-mode:screen}
  @keyframes morph{0%,100%{border-radius:52% 48% 46% 54%/48% 52% 48% 52%}50%{border-radius:44% 56% 58% 42%/56% 44% 56% 44%}}
  @keyframes float{0%,100%{translate:0 0}50%{translate:0 -14px}}

  main{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
  .glass{background:rgba(255,255,255,.48);border:1px solid rgba(255,255,255,.72);
    backdrop-filter:blur(15px) saturate(165%);-webkit-backdrop-filter:blur(15px) saturate(165%);position:relative;overflow:hidden;
    box-shadow:0 12px 34px -10px rgba(60,50,110,.18), inset 0 1px 0 rgba(255,255,255,.95)}
  .glass::after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(160px 160px at var(--mx) var(--my), rgba(255,255,255,.55), transparent 60%);mix-blend-mode:screen}
  .nav{position:fixed;top:22px;left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:22px;padding:11px 22px;border-radius:999px;font:500 13px "JetBrains Mono",monospace;color:#5a5678}
  .nav b{color:var(--ink)}
  .eyebrow{font:600 11px "JetBrains Mono",monospace;letter-spacing:.22em;text-transform:uppercase;padding:9px 18px;border-radius:999px;margin-bottom:24px;animation:rise 1.1s .1s both}
  h1{font-size:clamp(72px,12vw,168px);line-height:.9;font-weight:600;letter-spacing:-.04em;animation:reveal 1.2s .15s both}
  .tag{margin-top:20px;max-width:440px;font-size:clamp(15px,1.5vw,19px);line-height:1.55;color:var(--muted);animation:rise 1.1s .35s both}
  .cta{margin-top:32px;display:inline-block;font:600 15px "Space Grotesk";color:#fff;background:var(--accent);
    padding:15px 30px;border-radius:999px;text-decoration:none;box-shadow:0 16px 34px -10px rgba(26,166,176,.5);animation:rise 1.1s .5s both;transition:transform .2s}
  .cta:hover{transform:translateY(-2px) scale(1.03)}
  .cue{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:5;font:500 11px "JetBrains Mono";letter-spacing:.3em;color:var(--muted);animation:bob 2.4s infinite}
  @keyframes reveal{from{opacity:0;filter:blur(18px);transform:translateY(22px)}to{opacity:1;filter:blur(0);transform:none}}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}
  .badge{position:fixed;bottom:22px;right:22px;z-index:5;font:500 11px "JetBrains Mono";color:var(--muted)}
</style>
</head>
<body>
  <div class="mesh"><span class="b1"></span><span class="b2"></span><span class="b3"></span></div>
  <div class="cp-wrap"><div class="blob"></div></div>
  <nav class="nav glass"><b>capad</b><span>work</span><span>about</span><span>contact</span></nav>
  <main>
    <span class="eyebrow glass">developer tools · desktop apps</span>
    <h1>capad</h1>
    <p class="tag">I build fast, genuinely-free tools for people who live in a terminal and an editor.</p>
    <a class="cta" href="#">View the work</a>
  </main>
  <div class="cue">SCROLL</div>
  <div class="badge">C · Aurora</div>
<script>
  const cp=document.querySelector('.cp-wrap');
  const glass=document.querySelectorAll('.glass, .blob');
  addEventListener('pointermove',e=>{
    glass.forEach(el=>{const r=el.getBoundingClientRect();el.style.setProperty('--mx',(e.clientX-r.left)+'px');el.style.setProperty('--my',(e.clientY-r.top)+'px')});
    cp.style.setProperty('--px',((e.clientX/innerWidth)-.5)*30+'px');
    cp.style.setProperty('--py',((e.clientY/innerHeight)-.5)*30+'px');
  });
</script>
</body>
</html>
