<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>capad — true Apple Liquid Glass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#1c1830; --muted:#6b6680; --accent:#7c5cff; --mx:50%; --my:50%; }
  *{box-sizing:border-box;margin:0}
  html,body{height:100%}
  body{font-family:"Space Grotesk",system-ui,sans-serif;color:var(--ink);background:#f4f1ec;overflow:hidden;cursor:none}
  /* soft color so the glass has something to bend */
  .wash{position:fixed;inset:-12%;z-index:0;filter:blur(8px)}
  .wash span{position:absolute;border-radius:50%;filter:blur(64px);opacity:.8;animation:drift 24s ease-in-out infinite}
  .w1{width:44vw;height:44vw;left:4%;top:-4%;background:#ffd6c0}
  .w2{width:46vw;height:46vw;right:-2%;bottom:-8%;background:#dcd0ff;animation-delay:-8s}
  .w3{width:34vw;height:34vw;left:42%;top:46%;background:#c9f3e6;animation-delay:-15s}
  @keyframes drift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(3%,2%) scale(1.07)}}

  .content{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
  h1{font-size:clamp(78px,13vw,190px);line-height:.88;font-weight:700;letter-spacing:-.045em}
  .tag{margin-top:18px;max-width:430px;font-size:clamp(15px,1.5vw,19px);line-height:1.55;color:var(--muted)}

  /* ---- the real liquid-glass material: blur + saturate + SVG refraction ---- */
  .lg{position:relative;overflow:hidden;
    background:rgba(255,255,255,.28);
    border:1px solid rgba(255,255,255,.6);
    box-shadow:0 10px 30px -10px rgba(40,30,80,.22),
      inset 0 1px 0 rgba(255,255,255,.9), inset 0 -8px 14px -10px rgba(120,100,200,.25);
    backdrop-filter:blur(2px) saturate(180%) url(#liquid);
    -webkit-backdrop-filter:blur(8px) saturate(180%);}
  .lg::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(160px 160px at var(--mx) var(--my), rgba(255,255,255,.65), transparent 60%);mix-blend-mode:screen}

  .nav{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:4;display:flex;gap:22px;align-items:center;
    padding:12px 22px;border-radius:999px;font:500 13px "JetBrains Mono",monospace;color:#4a4560}
  .nav b{color:var(--ink)}
  .eyebrow{position:relative;z-index:2;font:600 11px "JetBrains Mono",monospace;letter-spacing:.22em;text-transform:uppercase;padding:10px 18px;border-radius:999px;margin-bottom:26px}
  .cta{position:relative;z-index:2;margin-top:30px;font:600 15px "Space Grotesk";color:var(--ink);padding:15px 30px;border-radius:999px;cursor:none;
    background:rgba(255,255,255,.32)}
  .cta b{color:var(--accent)}

  /* cursor-following glass lens that refracts whatever's behind it */
  .lens{position:fixed;z-index:9;width:190px;height:190px;border-radius:50%;left:0;top:0;pointer-events:none;
    transform:translate(-50%,-50%);transition:width .2s,height .2s;
    backdrop-filter:blur(1px) saturate(190%) url(#liquidLens);
    border:1.5px solid rgba(255,255,255,.7);
    box-shadow:inset 0 0 30px rgba(255,255,255,.55), inset 0 -16px 30px -14px rgba(120,100,200,.4),
      0 24px 50px -20px rgba(60,40,120,.35);}
  .lens::after{content:"";position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(70px 70px at 38% 30%, rgba(255,255,255,.8), transparent 55%)}
  .hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:4;font:500 11px "JetBrains Mono";letter-spacing:.2em;color:var(--muted)}
  .badge{position:fixed;bottom:22px;right:22px;z-index:4;font:500 11px "JetBrains Mono";color:var(--muted)}
</style>
</head>
<body>
  <!-- refraction filters (Chromium / Vivaldi) -->
  <svg width="0" height="0" style="position:absolute">
    <filter id="liquid" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.008 0.012" numOctaves="2" seed="4" result="n"/>
      <feGaussianBlur in="n" stdDeviation="1.4" result="nb"/>
      <feDisplacementMap in="SourceGraphic" in2="nb" scale="16" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="liquidLens" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.006 0.009" numOctaves="2" seed="9" result="n"/>
      <feGaussianBlur in="n" stdDeviation="2.2" result="nb"/>
      <feDisplacementMap in="SourceGraphic" in2="nb" scale="42" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <div class="wash"><span class="w1"></span><span class="w2"></span><span class="w3"></span></div>

  <nav class="nav lg"><b>capad</b><span>work</span><span>about</span><span>contact</span></nav>

  <div class="content">
    <span class="eyebrow lg">developer tools · desktop apps</span>
    <h1>capad</h1>
    <p class="tag">I build fast, genuinely-free tools for people who live in a terminal and an editor.</p>
    <button class="cta lg">View the <b>work</b></button>
  </div>

  <div class="lens" id="lens"></div>
  <div class="hint">MOVE YOUR CURSOR — the glass bends the light behind it</div>
  <div class="badge">true liquid glass</div>
<script>
  const lens=document.getElementById('lens');
  const glass=document.querySelectorAll('.lg');
  addEventListener('pointermove',e=>{
    lens.style.left=e.clientX+'px'; lens.style.top=e.clientY+'px';
    glass.forEach(el=>{const r=el.getBoundingClientRect();el.style.setProperty('--mx',(e.clientX-r.left)+'px');el.style.setProperty('--my',(e.clientY-r.top)+'px')});
  });
  addEventListener('pointerdown',()=>{lens.style.width='250px';lens.style.height='250px'});
  addEventListener('pointerup',()=>{lens.style.width='190px';lens.style.height='190px'});
</script>
</body>
</html>
