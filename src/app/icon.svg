<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="capad">
  <!-- flat, bold, no gradients: survives 16px tab rendering without smearing -->
  <rect width="100" height="100" rx="24" fill="#0b0b0d"/>
  <!-- the capad c with a liquid drop falling off its terminal — the brand
       letter carrying the site's liquid gesture. c sits up-left and the drop
       is oversized + separated so both shapes stay legible at 16px. -->
  <path d="M 66 32 A 24 24 0 1 0 66 62" fill="none" stroke="#f1e6c8" stroke-width="15" stroke-linecap="round"/>
  <path d="M73 52 C 77 60, 84 65, 84 72 A 11 11 0 1 1 62 72 C 62 65, 69 60, 73 52 Z" fill="#f1e6c8"/>
</svg>
